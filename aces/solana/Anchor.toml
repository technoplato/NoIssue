# Anchor.toml — the canonical Solana test setup.
# `anchor test` boots a local validator, deploys
# the program, and runs tests/*.ts against it.
# Localnet is the default (Michael's preference —
# devnet airdrops are flaky).

[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
ledger = "F2z8XxW4fzS44QHrSjSgvDwTHn6unx6tjxoEDHmhHKGn"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.test.ts"

[test.validator]
# a fresh throwaway validator per run
