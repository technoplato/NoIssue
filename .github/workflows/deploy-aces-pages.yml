# =============================================
# Deploy the ACES arcade to GitHub Pages.
#
# Tests GATE the deploy: if any suite fails,
# nothing ships. The artifact is assembled by
# copying files — there is no bundler, because
# the arcade loads the same CommonJS modules
# the tests run (see aces/index.html).
#
# First run switches this repo's Pages source
# from "deploy from main (Jekyll)" to "GitHub
# Actions" (configure-pages enablement). The
# old README page is linked from the new root.
# =============================================
name: deploy-aces-pages

on:
  push:
    branches:
      - claude/aces-engine-architecture-pqbmyu
      - main
    paths:
      - "aces/**"
      - ".github/workflows/deploy-aces-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: run every suite
        run: cd aces && npm test

  deploy:
    # NOTE: no `environment:` block on purpose.
    # The repo's auto-created github-pages
    # environment carries a deployment-branch
    # policy (main only, from the old Jekyll
    # setup) that instantly rejects jobs from
    # this branch. Without the block the job
    # runs; deploy-pages still targets Pages.
    # If Pages' API also enforces the policy,
    # fix in Settings -> Environments ->
    # github-pages -> add this branch.
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: assemble site
        run: |
          mkdir -p _site/aces
          cp aces/deploy/root-index.html \
             _site/index.html
          cp aces/*.js aces/*.json aces/*.md \
             aces/index.html _site/aces/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
